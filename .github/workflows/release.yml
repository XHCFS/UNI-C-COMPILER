name: Release

# One rolling release only: tag `continuous` is recreated and overwritten on each run.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rolling-release
  cancel-in-progress: true

jobs:
  build-release:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ccompiler-linux-x86_64
            binary_path: build/bin/ccompiler
          - os: windows-latest
            artifact_name: ccompiler-windows-x86_64
            binary_path: build/Release/ccompiler.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential qt6-base-dev libgl-dev

      - name: Install Qt6 (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.*'
          arch: win64_msvc2019_64
          cache: true

      - name: Configure CMake (Release)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests before packaging
        working-directory: build
        run: ctest --output-on-failure -C Release

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp build/bin/ccompiler dist/ccompiler
          cp README.md dist/ 2>/dev/null || true
          tar -czf ${{ matrix.artifact_name }}.tar.gz -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy build\Release\ccompiler.exe dist\ccompiler.exe
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact_name }}.zip
        shell: pwsh

      - name: Upload release artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.tar.gz

      - name: Upload release artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

  publish-rolling-release:
    name: Publish rolling GitHub Release
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create single rolling release (always replaces the same one)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          mapfile -t ASSETS < <(find release-assets -type f \( -name '*.tar.gz' -o -name '*.zip' \) | sort)
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No packaged assets found under release-assets/" >&2
            exit 1
          fi
          gh release delete continuous --repo "${{ github.repository }}" --yes 2>/dev/null || true
          {
            echo "Automated rolling build from commit \`${{ github.sha }}\` on branch \`${{ github.ref_name }}\`."
            echo
            echo "## Downloads"
            echo "| Platform | Asset |"
            echo "|----------|-------|"
            echo "| Linux x86_64 | \`ccompiler-linux-x86_64.tar.gz\` |"
            echo "| Windows x86_64 | \`ccompiler-windows-x86_64.zip\` |"
          } > release-notes.md
          gh release create continuous \
            --repo "${{ github.repository }}" \
            --title "UNI-C Compiler (continuous)" \
            --notes-file release-notes.md \
            --target "${{ github.sha }}" \
            "${ASSETS[@]}"
